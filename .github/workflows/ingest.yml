name: Ingestion planifiée des actualités

# Tourne toutes les 20 minutes, indépendamment des limites de cron de Vercel Hobby (1x/jour).
# Voir docs/architecture.md et docs/strategie/stack-technique.md pour le contexte.
on:
  schedule:
    - cron: "*/20 * * * *"
  workflow_dispatch: {}

# Jamais deux ingestions en parallèle : si un run déborde sur le créneau suivant,
# le nouveau attend au lieu de s'empiler (et de multiplier les minutes consommées).
concurrency:
  group: ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    # Coupe les runs bloqués : sans cette borne, un fetch qui pend peut tourner 6 h
    # (défaut GitHub) et brûler le quota de minutes du compte. 25 min car un run normal
    # (~2000 articles + retries rate-limit GDELT/Reddit) dépasse parfois les 15 min.
    timeout-minutes: 25
    # DATABASE_URL au niveau du job : nécessaire à la fois pour `prisma migrate deploy`
    # et pour l'ingestion elle-même.
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
      GNEWS_KEY: ${{ secrets.GNEWS_KEY }}
      SUMMARIZER_PROVIDER: ${{ vars.SUMMARIZER_PROVIDER || 'extractive' }}
      INTERPRETER_PROVIDER: ${{ vars.INTERPRETER_PROVIDER || 'heuristic' }}
    steps:
      - name: Vérifier la présence du secret DATABASE_URL
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::Le secret DATABASE_URL n'est pas défini dans les réglages du dépôt (Settings > Secrets and variables > Actions). L'ingestion planifiée a besoin d'une base Postgres managée (Supabase/Neon), voir .env.example."
            exit 1
          fi

      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"
          cache: "npm"

      - name: Installer les dépendances
        run: npm ci

      - name: Générer le client Prisma
        run: npx prisma generate

      - name: Appliquer les migrations en attente
        run: npx prisma migrate deploy

      - name: Lancer l'ingestion
        run: npm run ingest
